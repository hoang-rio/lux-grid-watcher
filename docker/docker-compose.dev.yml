services:
  postgres:
    image: postgres:17-alpine
    container_name: lux_pg_dev
    restart: unless-stopped
    env_file:
      - ./env/dev.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lux_web_viewer}
      POSTGRES_USER: ${POSTGRES_USER:-lux}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lux_dev_password}
    ports:
      - "5433:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lux} -d ${POSTGRES_DB:-lux_web_viewer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  lux_web_viewer:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile.dev
    container_name: lux_web_viewer_dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./env/dev.env
    environment:
      POSTGRES_DB_URL: postgresql+psycopg://${POSTGRES_USER:-lux}:${POSTGRES_PASSWORD:-lux_dev_password}@postgres:5432/${POSTGRES_DB:-lux_web_viewer}
      AUTH_ENABLED: "false"
    command: >
      sh -c "alembic upgrade head && python app.py"
    volumes:
      - ..:/app
    working_dir: /app
    ports:
      - "8088:88"
      - "8443:8443"
      - "4346:4346"

  adminer:
    image: adminer:4
    container_name: lux_adminer_dev
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DEFAULT_DB_DRIVER: pgsql
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8089:8080"

volumes:
  pg_data_dev:

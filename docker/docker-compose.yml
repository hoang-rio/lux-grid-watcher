services:
  lux_web_viewer:
    image: ghcr.io/hoang-rio/lux-web-viewer:latest
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    container_name: lux_web_viewer
    environment:
      - TZ=Asia/Ho_Chi_Minh
    restart: unless-stopped
    volumes:
      - ../.env:/app/.env:ro
      - ../db:/app/db:rw
    ports:
      - 8088:8088
      - 8443:8443
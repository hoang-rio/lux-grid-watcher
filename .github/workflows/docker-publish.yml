name: Build and Push Docker image to GHCR

on:
  push:
    tags:
      - 'SaaS-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        default: 'SaaS-v1.0.0'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TAG_TO_RELEASE: ${{ github.event.inputs.tag || github.ref_name }}
  BRANCH_TAG: SaaS

concurrency:
  group: build_${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
        contents: read
        packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG_TO_RELEASE }}
          submodules: recursive
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG_TO_RELEASE }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BRANCH_TAG }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG_TO_RELEASE }}

      - name: Ensure remote deploy directory exists
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.LUX_DEPLOY_HOST }}
          username: ${{ secrets.LUX_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          port: ${{ secrets.LUX_DEPLOY_PORT || '22' }}
          script: mkdir -p "${{ secrets.LUX_DEPLOY_PATH }}"

      - name: Copy production compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LUX_DEPLOY_HOST }}
          username: ${{ secrets.LUX_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          port: ${{ secrets.LUX_DEPLOY_PORT || '22' }}
          source: docker/docker-compose.prod.yml
          target: ${{ secrets.LUX_DEPLOY_PATH }}
          strip_components: 1

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.LUX_DEPLOY_HOST }}
          username: ${{ secrets.LUX_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          port: ${{ secrets.LUX_DEPLOY_PORT || '22' }}
          script: |
            set -e
            cd "${{ secrets.LUX_DEPLOY_PATH }}"
            mv -f docker-compose.prod.yml docker-compose.yml
            docker compose pull
            docker compose up -d
            docker image prune -af



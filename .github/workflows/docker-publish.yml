name: Build and Push Docker image to GHCR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        default: 'v1.0.0'
      dry-run:
        description: 'Dry run (build only, no push/release)'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TAG_TO_RELEASE: ${{ github.event.inputs.tag || github.ref_name }}
  DRY_RUN: ${{ github.event.inputs.dry-run || 'false' }}

concurrency:
  group: build_${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
        contents: write
        packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG_TO_RELEASE }}
          submodules: recursive
          fetch-depth: 50

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Log in to GitHub Container Registry
        if: env.DRY_RUN == 'false'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          push: ${{ env.DRY_RUN == 'false' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG_TO_RELEASE }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: ${{ env.DRY_RUN == 'false' && 'type=gha,mode=max' || '' }}

      - name: Get previous tag
        if: env.DRY_RUN == 'false'
        id: previoustag
        run: |
          PREV_TAG=$(git tag --list 'v*' --sort=-creatordate | grep -v "${{ env.TAG_TO_RELEASE }}" | head -n 1)
          echo "Previous tag: $PREV_TAG"
          echo "previous_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate commit changelog
        if: env.DRY_RUN == 'false'
        id: changelog
        run: |
            PREV_TAG="${{ steps.previoustag.outputs.previous_tag }}"
            echo "Previous tag: $PREV_TAG"
            CURR_TAG="${{ env.TAG_TO_RELEASE }}"
            if [ -z "$PREV_TAG" ]; then
                git log --pretty=format:'* %h: %s' $CURR_TAG | head -n 10 > commits.txt
            else
                git log --pretty=format:'* %h: %s' $PREV_TAG..$CURR_TAG | head -n 10 > commits.txt
            fi
            {
                echo 'changelog<<EOF'
                echo "$(cat commits.txt)"
                echo EOF
            } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: env.DRY_RUN == 'false'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.TAG_TO_RELEASE }}
          name: Release ${{ env.TAG_TO_RELEASE }}
          body: |
            ## Docker Image
            [View on GitHub Container Registry](https://github.com/${{github.repository}}/pkgs/container/lux-web-viewer)
            
            Pull with:
            ```sh
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG_TO_RELEASE }}
            ```

            ### What's Changed
            ${{ steps.changelog.outputs.changelog }}

            **Full changelog**: https://github.com/${{github.repository}}/compare/${{ steps.previoustag.outputs.previous_tag }}...${{ env.TAG_TO_RELEASE }}

name: Build and Push Docker image to GHCR

on:
  push:
    tags:
      - 'SaaS-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (leave empty to build current branch and push as SaaS only)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BRANCH_TAG: SaaS

concurrency:
  group: build_${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
        contents: read
        packages: write
    steps:
      - name: Compute checkout ref and Docker tags
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push: checkout the pushed tag
            echo "checkout_ref=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "docker_tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BRANCH_TAG }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            # workflow_dispatch with a tag: checkout that tag, push both tag and SaaS
            echo "checkout_ref=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
            echo "docker_tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BRANCH_TAG }}" >> $GITHUB_OUTPUT
          else
            # workflow_dispatch without tag: checkout current branch, push SaaS only
            echo "checkout_ref=${{ github.ref }}" >> $GITHUB_OUTPUT
            echo "docker_tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BRANCH_TAG }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.meta.outputs.checkout_ref }}
          submodules: recursive
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.docker_tags }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Ensure remote deploy directory exists
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.LUX_DEPLOY_HOST }}
          username: ${{ secrets.LUX_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          port: ${{ secrets.LUX_DEPLOY_PORT || '22' }}
          script: mkdir -p "${{ secrets.LUX_DEPLOY_PATH }}"

      - name: Copy production compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LUX_DEPLOY_HOST }}
          username: ${{ secrets.LUX_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          port: ${{ secrets.LUX_DEPLOY_PORT || '22' }}
          source: docker/docker-compose.prod.yml
          target: ${{ secrets.LUX_DEPLOY_PATH }}
          strip_components: 1

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.LUX_DEPLOY_HOST }}
          username: ${{ secrets.LUX_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          port: ${{ secrets.LUX_DEPLOY_PORT || '22' }}
          script: |
            set -e
            cd "${{ secrets.LUX_DEPLOY_PATH }}"
            mv -f docker-compose.prod.yml docker-compose.yml
            docker compose pull
            docker compose up -d
            docker image prune -af

